name: kuber
description: "Kuber — local-first expense manager"
publish_to: 'none'
version: 1.3.1+5

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.0

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Navigation
  go_router: ^14.8.1

  # Authentication
  local_auth: ^2.3.0

  # Theming
  dynamic_color: ^1.7.0
  google_fonts: ^8.0.2

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  another_flushbar: ^1.12.30
  permission_handler: ^12.0.1
  csv: ^8.0.0
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  device_info_plus: ^12.3.0
  open_file: ^3.5.9
  flutter_local_notifications: ^18.0.1
  pdf: ^3.11.0

  # Charts
  fl_chart: ^1.2.0
  shimmer: ^3.0.0

  package_info_plus: ^8.0.0
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  mocktail: ^1.0.4
  fake_async: ^1.3.2

flutter:
  uses-material-design: true

  assets:
    - android/play_store_512.png
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
